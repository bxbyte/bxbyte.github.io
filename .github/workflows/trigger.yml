name: Trigger workflow of portfolio

on:
  # Run on pushes targeting main branches
  push:
    tags:
      - "*"
  # Manually run from the Actions tab
  workflow_dispatch:

# Environment variables
env:
  repo: bxbyte.github.io

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow of portfolio
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ env.repo }}/dispatches \
            -d "{\"event_type\": \"${{ github.event_name }} from ${{ github.repository }}\"}"
