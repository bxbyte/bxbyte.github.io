name: Build & publish Next.js site to Github Pages

on:
  # Run on pushes targeting main branches
  push:
    tags:
      - '*.public'
  # Run on pushes from other repo
  repository_dispatch:
  # Manually run from the Actions tab
  workflow_dispatch:

# Environment variables
env:
  manager: npm
  command: ci
  runner: npx --no-install
  lock: '**/package-lock.json'
  nodeVersion: 20

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/website

jobs:
  # Assembling repositery
  assembling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive
      - name: Update git submodule
        working-directory:
        run: |
          git submodule update --force --recursive --init --remote
      - name: Get & check working directory
        id: dir
        run: |
          echo "working=$(pwd)" >> $GITHUB_OUTPUT
          echo Working directory : $(pwd)
          echo Content :
          tree
      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          path: ../*
          overwrite: true

  # Building website
  build:
    runs-on: ubuntu-latest
    needs: assembling
    steps:
      - name: Restore artifacts
        uses: actions/download-artifact@main
        with:
          path: '..'
          pattern: '*'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.nodeVersion }}
          cache: ${{ env.manager }}
          cache-dependency-path: ${{ env.lock }}
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles(env.lock) }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles(env.lock) }}-
      - name: Install dependencies
        run: ${{ env.manager }} ${{ env.command }}
      - name: Build with Next.js
        run: ${{ env.runner }} next build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dir.outputs.working }}/out

  # Publishing website
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
